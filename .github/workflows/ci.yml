name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          # Dummy values — real auth is bypassed in tests via monkeypatch
          SUPABASE_JWT_SECRET: ci-placeholder-secret
          SUPABASE_URL: https://example.supabase.co

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend type-check & lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

  # ── Docker build validation ───────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build ./backend -t pang-backend

      - name: Build frontend image
        run: |
          docker build ./website \
            --build-arg VITE_SUPABASE_URL=https://example.supabase.co \
            --build-arg VITE_SUPABASE_ANON_KEY=ci-placeholder-key \
            -t pang-frontend
